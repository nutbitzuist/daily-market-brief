name: Daily Thai Market Pulse

on:
  schedule:
    # 11:00 UTC = 18:00 Asia/Bangkok, Mon-Fri (SET trading days only)
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate Thai Market Pulse
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: python scripts/th_market_pulse.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pulse/
          git diff --staged --quiet && exit 0
          git commit -m "🇹🇭 thai market pulse $(date -u +%F)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep $((RANDOM % 10 + 5))
          done
          exit 1
